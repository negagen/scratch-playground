<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scratch Blocks (Spaghetti stress test)</title>
  <style>
    html, body { margin: 0; height: 100%; }
    #workspace { width: 100%; height: 100%; }
    #controls {
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: sans-serif;
      font-size: 13px;
    }
    #controls input[type="number"] { width: 52px; }
  </style>
</head>
<body>
  <div id="controls">
    <label>Depth <input id="depth" type="number" min="1" max="8" value="3" /></label>
    <label>Count <input id="count" type="number" min="1" max="400" value="100" /></label>
    <label>Every ms <input id="intervalMs" type="number" min="50" max="5000" value="500" /></label>
    <button id="sprinklesBtn" type="button">Sprinkles!</button>
    <button id="startAutoBtn" type="button">Start Auto Sprinkles</button>
    <button id="stopAutoBtn" type="button" disabled>Stop</button>
    <button id="spaghettiBtn" type="button">Spaghetti!</button>
    <button id="clearBtn" type="button">Clear</button>
  </div>
  <div id="workspace"></div>
  <script type="module">
    import * as ScratchBlocks from '/main.mjs';

    const defaultColors = {
      motion: { colourPrimary: '#4C97FF', colourSecondary: '#4280D7', colourTertiary: '#3373CC', colourQuaternary: '#3373CC' },
      looks: { colourPrimary: '#9966FF', colourSecondary: '#855CD6', colourTertiary: '#774DCB', colourQuaternary: '#774DCB' },
      sounds: { colourPrimary: '#CF63CF', colourSecondary: '#C94FC9', colourTertiary: '#BD42BD', colourQuaternary: '#BD42BD' },
      control: { colourPrimary: '#FFAB19', colourSecondary: '#EC9C13', colourTertiary: '#CF8B17', colourQuaternary: '#CF8B17' },
      event: { colourPrimary: '#FFBF00', colourSecondary: '#E6AC00', colourTertiary: '#CC9900', colourQuaternary: '#CC9900' },
      sensing: { colourPrimary: '#5CB1D6', colourSecondary: '#47A8D1', colourTertiary: '#2E8EB8', colourQuaternary: '#2E8EB8' },
      pen: { colourPrimary: '#0fBD8C', colourSecondary: '#0DA57A', colourTertiary: '#0B8E69', colourQuaternary: '#0B8E69' },
      operators: { colourPrimary: '#59C059', colourSecondary: '#46B946', colourTertiary: '#389438', colourQuaternary: '#389438' },
      data: { colourPrimary: '#FF8C1A', colourSecondary: '#FF8000', colourTertiary: '#DB6E00', colourQuaternary: '#DB6E00' },
      data_lists: { colourPrimary: '#FF661A', colourSecondary: '#FF5500', colourTertiary: '#E64D00', colourQuaternary: '#E64D00' },
      more: { colourPrimary: '#FF6680', colourSecondary: '#FF4D6A', colourTertiary: '#FF3355', colourQuaternary: '#FF3355' },
      text: '#FFFFFF',
      workspace: '#F9F9F9',
      toolboxHover: '#4C97FF',
      toolboxSelected: '#E9EEF2',
      toolboxText: '#575E75',
      toolbox: '#FFFFFF',
      flyout: '#F9F9F9',
      scrollbar: '#CECDCE',
      scrollbarHover: '#CECDCE',
      textField: '#FFFFFF',
      textFieldText: '#575E75',
      insertionMarker: '#000000',
      insertionMarkerOpacity: 0.2,
      dragShadowOpacity: 0.6,
      stackGlow: '#FFF200',
      stackGlowSize: 4,
      stackGlowOpacity: 1,
      replacementGlow: '#FFFFFF',
      replacementGlowSize: 2,
      replacementGlowOpacity: 1,
      colourPickerStroke: '#FFFFFF',
      fieldShadow: 'rgba(255, 255, 255, 0.3)',
      dropDownShadow: 'rgba(0, 0, 0, .3)',
      numPadBackground: '#547AB2',
      numPadBorder: '#435F91',
      numPadActiveBackground: '#435F91',
      numPadText: 'white',
      valueReportBackground: '#FFFFFF',
      valueReportBorder: '#AAAAAA',
      menuHover: 'rgba(0, 0, 0, 0.2)',
    };

    const toolbox = {
      contents: [
        {
          kind: 'category',
          name: 'Motion',
          toolboxitemid: 'motion',
          colour: '#4C97FF',
          secondaryColour: '#3373CC',
          contents: [
            { kind: 'block', type: 'motion_movesteps' },
            { kind: 'block', type: 'motion_turnright' },
            { kind: 'block', type: 'motion_turnleft' },
            { kind: 'block', type: 'motion_goto' },
            { kind: 'block', type: 'motion_glideto' },
          ],
        },
        {
          kind: 'category',
          name: 'Control',
          toolboxitemid: 'control',
          colour: '#FFAB19',
          secondaryColour: '#CF8B17',
          contents: [
            { kind: 'block', type: 'control_wait' },
            { kind: 'block', type: 'control_repeat' },
            { kind: 'block', type: 'control_forever' },
            { kind: 'block', type: 'control_if' },
            { kind: 'block', type: 'control_if_else' },
            { kind: 'block', type: 'control_stop' },
          ],
        },
        {
          kind: 'category',
          name: 'Operators',
          toolboxitemid: 'operators',
          colour: '#59C059',
          secondaryColour: '#389438',
          contents: [
            { kind: 'block', type: 'operator_equals' },
            { kind: 'block', type: 'operator_join' },
            { kind: 'block', type: 'operator_lt' },
          ],
        },
      ],
    };

    ScratchBlocks.ScratchMsgs.setLocale('en');
    const requiredContextMenuMsgs = {
      UNDO: 'Undo',
      REDO: 'Redo',
      CLEAN_UP: 'Clean up',
      DELETE_BLOCK: 'Delete Block',
      DELETE_X_BLOCKS: 'Delete %1 Blocks',
      DUPLICATE_BLOCK: 'Duplicate',
      ADD_COMMENT: 'Add Comment',
      REMOVE_COMMENT: 'Remove Comment',
      INLINE_INPUTS: 'Inline Inputs',
      EXTERNAL_INPUTS: 'External Inputs',
      COLLAPSE_BLOCK: 'Collapse Block',
      EXPAND_BLOCK: 'Expand Block',
      COLLAPSE_ALL: 'Collapse Blocks',
      EXPAND_ALL: 'Expand Blocks',
      DISABLE_BLOCK: 'Disable Block',
      ENABLE_BLOCK: 'Enable Block',
      HELP: 'Help',
    };
    Object.entries(requiredContextMenuMsgs).forEach(([key, value]) => {
      if (typeof ScratchBlocks.Msg[key] !== 'string') {
        ScratchBlocks.Msg[key] = value;
      }
    });

    const theme = new ScratchBlocks.Theme('default', defaultColors);
    const workspace = ScratchBlocks.inject(document.getElementById('workspace'), {
      media: '/media/',
      toolbox,
      theme,
      scratchTheme: 'classic',
    });

    const equalsXml = [
      '  <shadow type="operator_equals">',
      '    <value name="OPERAND1">',
      '      <shadow type="operator_join">',
      '        <value name="STRING1">',
      '          <shadow type="text">',
      '            <field name="TEXT">foo</field>',
      '          </shadow>',
      '        </value>',
      '        <value name="STRING2">',
      '          <shadow type="text">',
      '            <field name="TEXT">foo</field>',
      '          </shadow>',
      '        </value>',
      '      </shadow>',
      '    </value>',
      '    <value name="OPERAND2">',
      '      <shadow type="operator_equals"></shadow>',
      '    </value>',
      '  </shadow>',
    ].join('\n');

    const spaghettiXml = [
      '  <block type="control_if_else" x="40" y="60">',
      '    <value name="CONDITION">',
      '      <shadow type="operator_equals"></shadow>',
      '    </value>',
      '    <statement name="SUBSTACK"></statement>',
      '    <statement name="SUBSTACK2"></statement>',
      '    <next></next>',
      '  </block>',
    ].join('\n');

    function spaghetti(n) {
      console.log('Starting spaghetti. This may take some time...');
      let xml = spaghettiXml;
      for (let i = 0; i < 2 * n; i++) {
        xml = xml.replace(/(<statement name="SUBSTACK2?"?>)<\//g, '$1' + spaghettiXml + '</');
      }
      for (let i = 0; i < n; i++) {
        xml = xml.replace(/(<next>)<\//g, '$1' + spaghettiXml + '</');
      }
      let equalsBlock = equalsXml;
      for (let i = 0; i < n; i++) {
        equalsBlock = equalsBlock.replace(/(<shadow( type="operator_equals")?>)<\/shadow>/g, equalsXml);
      }
      xml = xml.replace(/(<shadow( type="operator_equals")?>)<\/shadow>/g, equalsBlock);
      const docXml = `<xml xmlns="http://www.w3.org/1999/xhtml">${xml}</xml>`;
      const dom = ScratchBlocks.utils.xml.textToDom(docXml);
      const xmlRoot = dom.nodeName.toLowerCase() === 'xml' ? dom : dom.firstElementChild;
      if (!xmlRoot) {
        throw new Error('Failed to parse generated spaghetti XML');
      }
      console.time('Spaghetti domToWorkspace');
      ScratchBlocks.Xml.domToWorkspace(xmlRoot, workspace);
      console.timeEnd('Spaghetti domToWorkspace');
    }

    function getToolboxBlockTypes(toolboxDef) {
      const types = [];
      const walk = (items) => {
        if (!Array.isArray(items)) return;
        for (const item of items) {
          if (!item || typeof item !== 'object') continue;
          if (item.kind === 'block' && typeof item.type === 'string') {
            types.push(item.type);
          }
          if (Array.isArray(item.contents)) {
            walk(item.contents);
          }
        }
      };
      walk(toolboxDef.contents);
      return types;
    }

    function sprinkles(n) {
      const blockTypes = getToolboxBlockTypes(toolbox);
      if (!blockTypes.length) {
        console.warn('No block types found in toolbox for sprinkles test.');
        return;
      }
      console.time('Sprinkles workspace.newBlock');
      for (let i = 0; i < n; i++) {
        const type = blockTypes[Math.floor(Math.random() * blockTypes.length)];
        const block = workspace.newBlock(type);
        block.initSvg();
        block.render();
        block.moveBy(Math.round(Math.random() * 650 + 40), Math.round(Math.random() * 900 + 40));
      }
      console.timeEnd('Sprinkles workspace.newBlock');
    }

    let autoSprinklesTimer = null;

    const sprinklesBtn = document.getElementById('sprinklesBtn');
    const startAutoBtn = document.getElementById('startAutoBtn');
    const stopAutoBtn = document.getElementById('stopAutoBtn');

    function runSprinklesFromInputs() {
      const count = Number(document.getElementById('count').value) || 100;
      sprinkles(Math.max(1, Math.min(400, count)));
    }

    function setAutoSprinklesRunning(running) {
      startAutoBtn.disabled = running;
      stopAutoBtn.disabled = !running;
      sprinklesBtn.disabled = running;
    }

    sprinklesBtn.addEventListener('click', () => {
      runSprinklesFromInputs();
    });

    startAutoBtn.addEventListener('click', () => {
      if (autoSprinklesTimer !== null) return;
      const intervalMs = Number(document.getElementById('intervalMs').value) || 500;
      const clamped = Math.max(50, Math.min(5000, intervalMs));
      setAutoSprinklesRunning(true);
      // Run once immediately, then keep applying load at interval.
      runSprinklesFromInputs();
      autoSprinklesTimer = window.setInterval(runSprinklesFromInputs, clamped);
    });

    stopAutoBtn.addEventListener('click', () => {
      if (autoSprinklesTimer === null) return;
      window.clearInterval(autoSprinklesTimer);
      autoSprinklesTimer = null;
      setAutoSprinklesRunning(false);
    });

    document.getElementById('spaghettiBtn').addEventListener('click', () => {
      const depth = Number(document.getElementById('depth').value) || 3;
      spaghetti(Math.max(1, Math.min(8, depth)));
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      workspace.clear();
    });
  </script>
</body>
</html>
