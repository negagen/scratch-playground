<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scratch Blocks (JSON toolbox)</title>
  <style>
    html, body { margin: 0; height: 100%; }
    #workspace { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="workspace"></div>
  <script type="module">
    import * as ScratchBlocks from '/main.mjs';

    // Mirror scratch-gui "default" blockColors.
    const defaultColors = {
      motion: { colourPrimary: '#4C97FF', colourSecondary: '#4280D7', colourTertiary: '#3373CC', colourQuaternary: '#3373CC' },
      looks: { colourPrimary: '#9966FF', colourSecondary: '#855CD6', colourTertiary: '#774DCB', colourQuaternary: '#774DCB' },
      sounds: { colourPrimary: '#CF63CF', colourSecondary: '#C94FC9', colourTertiary: '#BD42BD', colourQuaternary: '#BD42BD' },
      control: { colourPrimary: '#FFAB19', colourSecondary: '#EC9C13', colourTertiary: '#CF8B17', colourQuaternary: '#CF8B17' },
      event: { colourPrimary: '#FFBF00', colourSecondary: '#E6AC00', colourTertiary: '#CC9900', colourQuaternary: '#CC9900' },
      sensing: { colourPrimary: '#5CB1D6', colourSecondary: '#47A8D1', colourTertiary: '#2E8EB8', colourQuaternary: '#2E8EB8' },
      pen: { colourPrimary: '#0fBD8C', colourSecondary: '#0DA57A', colourTertiary: '#0B8E69', colourQuaternary: '#0B8E69' },
      operators: { colourPrimary: '#59C059', colourSecondary: '#46B946', colourTertiary: '#389438', colourQuaternary: '#389438' },
      data: { colourPrimary: '#FF8C1A', colourSecondary: '#FF8000', colourTertiary: '#DB6E00', colourQuaternary: '#DB6E00' },
      data_lists: { colourPrimary: '#FF661A', colourSecondary: '#FF5500', colourTertiary: '#E64D00', colourQuaternary: '#E64D00' },
      more: { colourPrimary: '#FF6680', colourSecondary: '#FF4D6A', colourTertiary: '#FF3355', colourQuaternary: '#FF3355' },
      text: '#FFFFFF',
      workspace: '#F9F9F9',
      toolboxHover: '#4C97FF',
      toolboxSelected: '#E9EEF2',
      toolboxText: '#575E75',
      toolbox: '#FFFFFF',
      flyout: '#F9F9F9',
      scrollbar: '#CECDCE',
      scrollbarHover: '#CECDCE',
      textField: '#FFFFFF',
      textFieldText: '#575E75',
      insertionMarker: '#000000',
      insertionMarkerOpacity: 0.2,
      dragShadowOpacity: 0.6,
      stackGlow: '#FFF200',
      stackGlowSize: 4,
      stackGlowOpacity: 1,
      replacementGlow: '#FFFFFF',
      replacementGlowSize: 2,
      replacementGlowOpacity: 1,
      colourPickerStroke: '#FFFFFF',
      fieldShadow: 'rgba(255, 255, 255, 0.3)',
      dropDownShadow: 'rgba(0, 0, 0, .3)',
      numPadBackground: '#547AB2',
      numPadBorder: '#435F91',
      numPadActiveBackground: '#435F91',
      numPadText: 'white',
      valueReportBackground: '#FFFFFF',
      valueReportBorder: '#AAAAAA',
      menuHover: 'rgba(0, 0, 0, 0.2)',
    };

    const toolbox = {
      contents: [
        {
          kind: 'category',
          name: 'Motion',
          toolboxitemid: 'motion',
          colour: '#4C97FF',
          secondaryColour: '#3373CC',
          contents: [
            { kind: 'block', type: 'motion_movesteps' },
            { kind: 'block', type: 'motion_turnright' },
            { kind: 'block', type: 'motion_turnleft' },
            { kind: 'block', type: 'motion_goto' },
            { kind: 'block', type: 'motion_glideto' },
          ],
        },
        {
          kind: 'category',
          name: 'Looks',
          toolboxitemid: 'looks',
          colour: '#9966FF',
          secondaryColour: '#774DCB',
          contents: [
            { kind: 'block', type: 'looks_say' },
            { kind: 'block', type: 'looks_sayforsecs' },
            { kind: 'block', type: 'looks_show' },
            { kind: 'block', type: 'looks_hide' },
            { kind: 'block', type: 'looks_changeeffectby' },
          ],
        },
        {
          kind: 'category',
          name: 'Events',
          toolboxitemid: 'event',
          colour: '#FFBF00',
          secondaryColour: '#CC9900',
          contents: [
            { kind: 'block', type: 'event_whenflagclicked' },
            { kind: 'block', type: 'event_whenkeypressed' },
            { kind: 'block', type: 'event_whenthisspriteclicked' },
            { kind: 'block', type: 'event_broadcast' },
            { kind: 'block', type: 'event_broadcastandwait' },
          ],
        },
        {
          kind: 'category',
          name: 'Control',
          toolboxitemid: 'control',
          colour: '#FFAB19',
          secondaryColour: '#CF8B17',
          contents: [
            { kind: 'block', type: 'control_wait' },
            { kind: 'block', type: 'control_repeat' },
            { kind: 'block', type: 'control_forever' },
            { kind: 'block', type: 'control_if' },
            { kind: 'block', type: 'control_if_else' },
            { kind: 'block', type: 'control_stop' },
          ],
        },
        {
          kind: 'category',
          name: 'Sensing',
          toolboxitemid: 'sensing',
          colour: '#5CB1D6',
          secondaryColour: '#2E8EB8',
          contents: [
            { kind: 'block', type: 'sensing_touchingcolor' },
            { kind: 'block', type: 'sensing_distanceto' },
            { kind: 'block', type: 'sensing_keypressed' },
            { kind: 'block', type: 'sensing_mousex' },
            { kind: 'block', type: 'sensing_mousey' },
          ],
        },
        {
          kind: 'category',
          name: 'Operators',
          toolboxitemid: 'operators',
          colour: '#59C059',
          secondaryColour: '#389438',
          contents: [
            { kind: 'block', type: 'operator_add' },
            { kind: 'block', type: 'operator_subtract' },
            { kind: 'block', type: 'operator_multiply' },
            { kind: 'block', type: 'operator_divide' },
            { kind: 'block', type: 'operator_random' },
            { kind: 'block', type: 'operator_equals' },
            { kind: 'block', type: 'operator_lt' },
            { kind: 'block', type: 'operator_gt' },
            { kind: 'block', type: 'operator_and' },
            { kind: 'block', type: 'operator_or' },
            { kind: 'block', type: 'operator_not' },
            { kind: 'block', type: 'operator_join' },
          ],
        },
      ],
    };

    // 1) Locale first.
    ScratchBlocks.ScratchMsgs.setLocale('en');
    // Scratch context menus ultimately feed MenuItem(text). If any label resolves
    // to undefined, Blockly tries appendChild(undefined) and right-click crashes.
    // Ensure common context-menu message keys exist in standalone HTML usage.
    const requiredContextMenuMsgs = {
      UNDO: 'Undo',
      REDO: 'Redo',
      CLEAN_UP: 'Clean up',
      DELETE_BLOCK: 'Delete Block',
      DELETE_X_BLOCKS: 'Delete %1 Blocks',
      DUPLICATE_BLOCK: 'Duplicate',
      ADD_COMMENT: 'Add Comment',
      REMOVE_COMMENT: 'Remove Comment',
      INLINE_INPUTS: 'Inline Inputs',
      EXTERNAL_INPUTS: 'External Inputs',
      COLLAPSE_BLOCK: 'Collapse Block',
      EXPAND_BLOCK: 'Expand Block',
      COLLAPSE_ALL: 'Collapse Blocks',
      EXPAND_ALL: 'Expand Blocks',
      DISABLE_BLOCK: 'Disable Block',
      ENABLE_BLOCK: 'Enable Block',
      HELP: 'Help',
    };
    Object.entries(requiredContextMenuMsgs).forEach(([key, value]) => {
      if (typeof ScratchBlocks.Msg[key] !== 'string') {
        ScratchBlocks.Msg[key] = value;
      }
    });
    // 2) Theme and colors.
    const theme = new ScratchBlocks.Theme('default', defaultColors);
    // 3) Inject with Blockly option key: "media".
    ScratchBlocks.inject(document.getElementById('workspace'), {
      media: '/media/',
      toolbox,
      theme,
      scratchTheme: 'classic',
    });
  </script>
</body>
</html>
