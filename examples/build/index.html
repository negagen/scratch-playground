 <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Scratch Blocks (minimal)</title>
    <style>
      html, body { margin: 0; height: 100%; }
      #workspace { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="workspace"></div>
    <!-- Toolbox as XML (matches scratch-gui usage pattern) -->
    <xml id="toolbox" style="display:none">
      <category name="Motion" toolboxitemid="motion" colour="#4C97FF" secondaryColour="#3373CC">
        <block type="motion_movesteps"></block>
        <block type="motion_turnright"></block>
        <block type="motion_turnleft"></block>
        <block type="motion_goto"></block>
        <block type="motion_glideto"></block>
      </category>
    </xml>
    <script type="module">
      import * as ScratchBlocks from '/main.mjs';
      // Mirror scratch-gui's "default" mode blockColors.
      // (This is what ScratchBlocks.Theme(...) expects as its second argument.)
      const defaultColors = {
        motion: { colourPrimary: '#4C97FF', colourSecondary: '#4280D7', colourTertiary: '#3373CC', colourQuaternary:
  '#3373CC' },
        looks: { colourPrimary: '#9966FF', colourSecondary: '#855CD6', colourTertiary: '#774DCB', colourQuaternary:
  '#774DCB' },
        sounds: { colourPrimary: '#CF63CF', colourSecondary: '#C94FC9', colourTertiary: '#BD42BD', colourQuaternary:
  '#BD42BD' },
        control: { colourPrimary: '#FFAB19', colourSecondary: '#EC9C13', colourTertiary: '#CF8B17', colourQuaternary:
  '#CF8B17' },
        event: { colourPrimary: '#FFBF00', colourSecondary: '#E6AC00', colourTertiary: '#CC9900', colourQuaternary:
  '#CC9900' },
        sensing: { colourPrimary: '#5CB1D6', colourSecondary: '#47A8D1', colourTertiary: '#2E8EB8', colourQuaternary:
  '#2E8EB8' },
        pen: { colourPrimary: '#0fBD8C', colourSecondary: '#0DA57A', colourTertiary: '#0B8E69', colourQuaternary:
  '#0B8E69' },
        operators: { colourPrimary: '#59C059', colourSecondary: '#46B946', colourTertiary: '#389438', colourQuaternary:
   '#389438' },
        data: { colourPrimary: '#FF8C1A', colourSecondary: '#FF8000', colourTertiary: '#DB6E00', colourQuaternary:
  '#DB6E00' },
        data_lists: { colourPrimary: '#FF661A', colourSecondary: '#FF5500', colourTertiary: '#E64D00',
  colourQuaternary: '#E64D00' },
        more: { colourPrimary: '#FF6680', colourSecondary: '#FF4D6A', colourTertiary: '#FF3355', colourQuaternary:
  '#FF3355' },
        // non-object keys are used by the scratch renderer to set CSS variables
        text: '#FFFFFF',
        workspace: '#F9F9F9',
        toolboxHover: '#4C97FF',
        toolboxSelected: '#E9EEF2',
        toolboxText: '#575E75',
        toolbox: '#FFFFFF',
        flyout: '#F9F9F9',
        scrollbar: '#CECDCE',
        scrollbarHover: '#CECDCE',
        textField: '#FFFFFF',
        textFieldText: '#575E75',
        insertionMarker: '#000000',
        insertionMarkerOpacity: 0.2,
        dragShadowOpacity: 0.6,
        stackGlow: '#FFF200',
        stackGlowSize: 4,
        stackGlowOpacity: 1,
        replacementGlow: '#FFFFFF',
        replacementGlowSize: 2,
        replacementGlowOpacity: 1,
        colourPickerStroke: '#FFFFFF',
        fieldShadow: 'rgba(255, 255, 255, 0.3)',
        dropDownShadow: 'rgba(0, 0, 0, .3)',
        numPadBackground: '#547AB2',
        numPadBorder: '#435F91',
        numPadActiveBackground: '#435F91',
        numPadText: 'white',
        valueReportBackground: '#FFFFFF',
        valueReportBorder: '#AAAAAA',
        menuHover: 'rgba(0, 0, 0, 0.2)',
      };
      // 1) Locale FIRST (scratch-gui pattern)
      ScratchBlocks.ScratchMsgs.setLocale('en');
      // 2) Theme matches scratch-gui's construction (avoids parseBlockColour(undefined))
      const theme = new ScratchBlocks.Theme('default', defaultColors);
      // 3) Inject with Blockly's expected option key: "media" (not "pathToMedia")
      ScratchBlocks.inject(document.getElementById('workspace'), {
        media: '/media/',               // <-- must be `media`
        toolbox: document.getElementById('toolbox'),
        theme,
        scratchTheme: 'classic',       // <-- matches scratch-gui
      });
    </script>
  </body>
  </html>
